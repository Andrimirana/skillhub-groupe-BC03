# Clé unique du projet (à adapter selon la configuration de votre serveur Sonar)
sonar.projectKey=skillhub-groupe-bc03
sonar.projectName=SkillHub - Groupe BC03
sonar.projectVersion=1.0

# Dossiers contenant le code source à analyser
sonar.sources=frontend, services/auth, services/catalog, services/inscription

# Encodage des fichiers
sonar.sourceEncoding=UTF-8

# EXCLUSIONS
sonar.exclusions=**/node_modules/**, **/vendor/**, **/storage/**, **/bootstrap/cache/**, **/dist/**, **/build/**, **/*.spec.js, **/*.test.js, **/tests/**

# ==========================================
# TESTS ET COUVERTURE (Optionnel)
# ==========================================

sonar.tests=services/auth/tests, services/catalog/tests, services/inscription/tests

# Pour générer des rapports de couverture (Coverage) :
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
# sonar.php.coverage.reportPaths=services/auth/coverage.xml, services/catalog/coverage.xml, services/inscription/coverage.xml