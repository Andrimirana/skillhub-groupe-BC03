# Clé unique du projet 
sonar.projectKey=Andrimirana_skillhub-groupe-BC03
sonar.projectName=SkillHub - Groupe BC03
sonar.projectVersion=1.0

# Organisation SonarCloud 
sonar.organization=andrimirana

# Dossiers contenant le code source à analyser (BACKEND UNIQUEMENT)
sonar.sources=services/auth, services/catalog, services/inscription

# Encodage des fichiers
sonar.sourceEncoding=UTF-8

# EXCLUSIONS
# Fichiers Laravel boilerplate et infrastructure microservices (identiques = duplication naturelle)
sonar.exclusions=**/node_modules/**, **/vendor/**, **/storage/**, **/bootstrap/cache/**, **/dist/**, **/build/**, **/*.spec.js, **/*.test.js, **/tests/**, \
services/*/config/app.php, services/*/config/auth.php, services/*/config/cache.php, services/*/config/cors.php, \
services/*/config/database.php, services/*/config/filesystems.php, services/*/config/logging.php, services/*/config/mail.php, \
services/*/config/queue.php, services/*/config/services.php, services/*/config/session.php, \
services/*/bootstrap/app.php, services/*/bootstrap/providers.php, \
services/*/Dockerfile, services/*/start.sh, \
services/*/app/Http/Controllers/Controller.php, services/*/app/Http/Middleware/ValidateServiceToken.php, services/*/app/Services/MongoActivityLogger.php

# ==========================================
# TESTS ET COUVERTURE 
# ==========================================

sonar.tests=services/auth/tests, services/catalog/tests, services/inscription/tests

# Rapports de couverture (Coverage)
sonar.php.coverage.reportPaths=services/auth/coverage.xml,services/catalog/coverage.xml,services/inscription/coverage.xml
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info