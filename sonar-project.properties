# Clé unique du projet
sonar.organization=andrimirana
sonar.projectKey=Andrimirana_skillhub-groupe-BC03
sonar.projectName=SkillHub - Groupe BC03
sonar.projectVersion=1.0

# Sources à analyser
sonar.sources=frontend/src,services/auth/app,services/catalog/app,services/inscription/app

# Encodage
sonar.sourceEncoding=UTF-8

# EXCLUSIONS 
sonar.exclusions=**/node_modules/**,**/vendor/**,**/storage/**,**/bootstrap/cache/**,**/dist/**,**/build/**,**/*.spec.js,**/*.test.js,**/tests/**

# TESTS 
sonar.tests=services/auth/tests,services/catalog/tests,services/inscription/tests

# ==========================================
# COUVERTURE (optionnel, à activer si tu génères les rapports)
# ==========================================

# Frontend JS
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# PHP (Laravel)
sonar.php.coverage.reportPaths=services/auth/coverage.xml

# Exclusions couverture : frontend sans test runner, catalog/inscription utilisent MongoDB (non dispo en CI)
sonar.coverage.exclusions=frontend/src/**,services/catalog/**,services/inscription/**