name: CI/CD Pipeline - SkillHub BC03

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  # ==========================================
  # Job 1: Tests Service Auth
  # ==========================================
  tests-auth:
    name: Tests Service Auth
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_sqlite, bcmath, gd, pcov
          coverage: pcov

      - name: Tests du Service Auth
        working-directory: ./services/auth
        run: |
          composer install --prefer-dist --no-progress
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate
          touch database/database.sqlite
          DB_CONNECTION=sqlite DB_DATABASE=database/database.sqlite php artisan test --coverage-clover coverage.xml

      - name: Sauvegarde couverture Auth
        uses: actions/upload-artifact@v4
        with:
          name: couverture-auth
          path: services/auth/coverage.xml

  # ==========================================
  # Job 2: Tests Service Catalog
  # ==========================================
  tests-catalog:
    name: Tests Service Catalog
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_sqlite, bcmath, gd, pcov
          coverage: pcov

      - name: Tests du Service Catalog
        working-directory: ./services/catalog
        run: |
          composer install --prefer-dist --no-progress
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate
          touch database/database.sqlite
          DB_CONNECTION=sqlite DB_DATABASE=database/database.sqlite php artisan test --coverage-clover coverage.xml

      - name: Sauvegarde couverture Catalog
        uses: actions/upload-artifact@v4
        with:
          name: couverture-catalog
          path: services/catalog/coverage.xml

  # ==========================================
  # Job 3: Tests Service Inscription
  # ==========================================
  tests-inscription:
    name: Tests Service Inscription
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_sqlite, bcmath, gd, pcov
          coverage: pcov

      - name: Tests du Service Inscription
        working-directory: ./services/inscription
        run: |
          composer install --prefer-dist --no-progress
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate
          touch database/database.sqlite
          DB_CONNECTION=sqlite DB_DATABASE=database/database.sqlite php artisan test --coverage-clover coverage.xml

      - name: Sauvegarde couverture Inscription
        uses: actions/upload-artifact@v4
        with:
          name: couverture-inscription
          path: services/inscription/coverage.xml

  # ==========================================
  # Job 4: Analyse SonarCloud
  # ==========================================
  sonarcloud:
    name: Analyse SonarCloud
    runs-on: ubuntu-latest
    needs: [tests-auth, tests-catalog, tests-inscription]
    if: github.event_name == 'push'
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Récupération couverture Auth
        uses: actions/download-artifact@v4
        with:
          name: couverture-auth
          path: services/auth

      - name: Récupération couverture Catalog
        uses: actions/download-artifact@v4
        with:
          name: couverture-catalog
          path: services/catalog

      - name: Récupération couverture Inscription
        uses: actions/download-artifact@v4
        with:
          name: couverture-inscription
          path: services/inscription

      - name: Analyse avec SonarCloud
        uses: SonarSource/sonarcloud-github-action@v3
        with:
          projectBaseDir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==========================================
  # Job 5: Build Docker
  # ==========================================
  docker-build:
    name: Build des images Docker
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: success()
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v2

      # --- FRONTEND ---
      - name: Build image Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: skillhub-frontend:latest

      # --- SERVICES ---
      - name: Build image Service Auth
        uses: docker/build-push-action@v4
        with:
          context: ./services/auth
          push: false
          tags: skillhub-auth:latest

      - name: Build image Service Catalog
        uses: docker/build-push-action@v4
        with:
          context: ./services/catalog
          push: false
          tags: skillhub-catalog:latest

      - name: Build image Service Inscription
        uses: docker/build-push-action@v4
        with:
          context: ./services/inscription
          push: false
          tags: skillhub-inscription:latest
