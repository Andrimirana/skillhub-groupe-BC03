name: CI/CD Pipeline - SkillHub BC03

# Le pipeline se déclenche selon votre stratégie de branches
on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  # Job 1: Tests du service Auth
  tests-auth:
    name: Tests Service Auth
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v3

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, openssl, pdo, pdo_sqlite, sqlite3

      - name: Installer les dépendances Auth
        run: |
          cd services/auth
          composer install --no-interaction --prefer-dist

      - name: Préparer l'environnement Auth
        run: |
          cd services/auth
          cp .env.example .env
          php artisan key:generate

      - name: Lancer les tests Auth
        run: |
          cd services/auth
          php artisan test

  # Job 2: Tests du service Catalog
  tests-catalog:
    name: Tests Service Catalog
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v3

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, openssl, pdo, pdo_sqlite, sqlite3

      - name: Installer les dépendances Catalog
        run: |
          cd services/catalog
          composer install --no-interaction --prefer-dist

      - name: Préparer l'environnement Catalog
        run: |
          cd services/catalog
          cp .env.example .env
          php artisan key:generate

      - name: Lancer les tests Catalog
        run: |
          cd services/catalog
          php artisan test

  # Job 3: Tests du service Inscription
  tests-inscription:
    name: Tests Service Inscription
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v3

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, openssl, pdo, pdo_sqlite, sqlite3

      - name: Installer les dépendances Inscription
        run: |
          cd services/inscription
          composer install --no-interaction --prefer-dist

      - name: Préparer l'environnement Inscription
        run: |
          cd services/inscription
          cp .env.example .env
          php artisan key:generate

      - name: Lancer les tests Inscription
        run: |
          cd services/inscription
          php artisan test

  # Job 4: Build et vérification du Frontend
  tests-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v3

      - name: Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Installer les dépendances frontend
        run: |
          cd frontend
          npm install

      - name: Copier .env
        run: |
          cd frontend
          cp .env.example .env

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  # Job 5: Analyse de code gérée par le Tech Lead (Mirana)
  sonar-scan:
    name: Scan de vulnérabilités (SonarQube)
    runs-on: ubuntu-latest
    needs: [ tests-auth, tests-catalog, tests-inscription, tests-frontend ]
    steps:
      - name: Récupération du code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Requis par Sonar pour analyser l'historique complet

      - name: Scan SonarQube
        uses: SonarSource/sonarcloud-github-action@master # À modifier par sonarqube-scan-action si auto-hébergé
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} # Décommenter si SonarQube est auto-hébergé

          # Job 6: Build des images Docker géré par le DevOps (Liwell)
  docker-build:
    name: Build des images Docker
    runs-on: ubuntu-latest
    needs: sonar-scan # S'assure que le scan passe avant de builder
    steps:
      - name: Récupération du code
        uses: actions/checkout@v3

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v2

      # --- BUILD DU FRONTEND ---
      - name: Build image Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: false # Mettre à true lors de la phase de déploiement (vers Docker Hub ou un registre Cloud)
          tags: skillhub-frontend:latest

      # --- BUILD DES SERVICES ---
      - name: Build image Service Auth
        uses: docker/build-push-action@v4
        with:
          context: ./services/auth
          push: false
          tags: skillhub-auth:latest

      - name: Build image Service Catalog
        uses: docker/build-push-action@v4
        with:
          context: ./services/catalog
          push: false
          tags: skillhub-catalog:latest

      - name: Build image Service Inscription
        uses: docker/build-push-action@v4
        with:
          context: ./services/inscription
          push: false
          tags: skillhub-inscription:latest
