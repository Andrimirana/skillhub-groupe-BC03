name: CI/CD Pipeline - SkillHub BC03

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  # ==========================================
  # Job 1: Tests automatisés (Le pré-requis absolu)
  # ==========================================
  tests-unitaires:
    name: Exécution des tests (Laravel)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_mysql, bcmath, gd
          coverage: xdebug

      - name: Tests du Service Auth avec Coverage
        working-directory: ./services/auth
        run: |
          composer install --prefer-dist --no-progress
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate
          touch database/database.sqlite
          DB_CONNECTION=sqlite DB_DATABASE=database/database.sqlite XDEBUG_MODE=coverage php artisan test --coverage-clover=coverage.xml
          ls -la coverage.xml || echo "Coverage Auth not generated"

      - name: Tests du Service Catalog avec Coverage
        working-directory: ./services/catalog
        run: |
          composer install --prefer-dist --no-progress
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate
          touch database/database.sqlite
          DB_CONNECTION=sqlite DB_DATABASE=database/database.sqlite XDEBUG_MODE=coverage php artisan test --coverage-clover=coverage.xml || true
          ls -la coverage.xml || echo "Coverage Catalog not generated"

      - name: Tests du Service Inscription avec Coverage
        working-directory: ./services/inscription
        run: |
          composer install --prefer-dist --no-progress
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate
          touch database/database.sqlite
          DB_CONNECTION=sqlite DB_DATABASE=database/database.sqlite XDEBUG_MODE=coverage php artisan test --coverage-clover=coverage.xml || true
          ls -la coverage.xml || echo "Coverage Inscription not generated"

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            services/auth/coverage.xml
            services/catalog/coverage.xml
            services/inscription/coverage.xml
          retention-days: 1

  # ==========================================
  # Job 2: Analyse de code gérée par le Tech Lead (Mirana)
  # ==========================================
  sonar-scan:
    name: Scan de vulnérabilités (SonarQube)
    runs-on: ubuntu-latest
    needs: tests-unitaires # <-- NOUVEAU: Attend que les tests soient au vert !
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Coverage Reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: .

      - name: Vérification des fichiers coverage
        run: |
          echo "Contenu du workspace:"
          ls -la
          echo "Fichiers coverage:"
          find . -name "coverage.xml" -type f

      - name: Scan SonarCloud
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==========================================
  # Job 3: Build des images Docker géré par le DevOps (Liwell)
  # ==========================================
  docker-build:
    name: Build des images Docker
    runs-on: ubuntu-latest
    needs: sonar-scan # <-- Attend que Sonar valide la qualité du code !
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v2

      # --- BUILD DU FRONTEND ---
      - name: Build image Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: false
          tags: skillhub-frontend:latest

      # --- BUILD DES SERVICES ---
      - name: Build image Service Auth
        uses: docker/build-push-action@v4
        with:
          context: ./services/auth
          push: false
          tags: skillhub-auth:latest

      - name: Build image Service Catalog
        uses: docker/build-push-action@v4
        with:
          context: ./services/catalog
          push: false
          tags: skillhub-catalog:latest

      - name: Build image Service Inscription
        uses: docker/build-push-action@v4
        with:
          context: ./services/inscription
          push: false
          tags: skillhub-inscription:latest
