name: CI/CD Pipeline - SkillHub BC03

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  # ==========================================
  # Job 1: Tests + Coverage Laravel
  # ==========================================
  tests-unitaires:
    name: Exécution des tests (Laravel)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de PHP avec Xdebug
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql, bcmath, gd, xdebug
          coverage: xdebug

      - name: Tests + Coverage Auth
        working-directory: ./services/auth
        run: |
          composer install --prefer-dist --no-progress
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate
          touch database/database.sqlite
          DB_CONNECTION=sqlite DB_DATABASE=database/database.sqlite \
          php artisan test --coverage-clover coverage.xml

      - name: Tests + Coverage Catalog
        working-directory: ./services/catalog
        run: |
          composer install --prefer-dist --no-progress
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate
          touch database/database.sqlite
          DB_CONNECTION=sqlite DB_DATABASE=database/database.sqlite \
          php artisan test --coverage-clover coverage.xml

      - name: Tests + Coverage Inscription
        working-directory: ./services/inscription
        run: |
          composer install --prefer-dist --no-progress
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate
          touch database/database.sqlite
          DB_CONNECTION=sqlite DB_DATABASE=database/database.sqlite \
          php artisan test --coverage-clover coverage.xml

      # Sauvegarder les fichiers coverage pour le job Sonar
      - name: Sauvegarde des rapports coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            services/auth/coverage.xml
            services/catalog/coverage.xml
            services/inscription/coverage.xml

  # ==========================================
  # Job 2: Sonar Scan
  # ==========================================
  sonar-scan:
    name: Scan de vulnérabilités (SonarQube)
    runs-on: ubuntu-latest
    needs: tests-unitaires
    if: github.ref == 'refs/heads/dev' || github.base_ref == 'dev'
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Récupérer les fichiers coverage générés dans Job 1
      - name: Récupération des rapports coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports

      - name: Scan SonarCloud
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==========================================
  # Job 3: Build des images Docker
  # ==========================================
  docker-build:
    name: Build des images Docker
    runs-on: ubuntu-latest
    needs: [tests-unitaires, sonar-scan]
    if: always() && needs.tests-unitaires.result == 'success' && needs.sonar-scan.result != 'failure'
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build image Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: skillhub-frontend:latest

      - name: Build image Service Auth
        uses: docker/build-push-action@v4
        with:
          context: ./services/auth
          push: false
          tags: skillhub-auth:latest

      - name: Build image Service Catalog
        uses: docker/build-push-action@v4
        with:
          context: ./services/catalog
          push: false
          tags: skillhub-catalog:latest

      - name: Build image Service Inscription
        uses: docker/build-push-action@v4
        with:
          context: ./services/inscription
          push: false
          tags: skillhub-inscription:latest