name: CI/CD Pipeline - SkillHub BC03

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  # ==========================================
  # Job 1: Lint Frontend
  # ==========================================
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        working-directory: ./frontend
        run: npm ci

      - name: Lint ESLint
        working-directory: ./frontend
        run: npm run lint -- --max-warnings=0 || true

  # ==========================================
  # Job 2: Lint PHP Services
  # ==========================================
  lint-php:
    name: Lint PHP Services
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: phpcs

      - name: Lint Service Auth
        run: find services/auth/app -name "*.php" | xargs php -l 2>&1 | grep -E "^(Parse|Fatal) error" && exit 1 || true

      - name: Lint Service Catalog
        run: find services/catalog/app -name "*.php" | xargs php -l 2>&1 | grep -E "^(Parse|Fatal) error" && exit 1 || true

      - name: Lint Service Inscription
        run: find services/inscription/app -name "*.php" | xargs php -l 2>&1 | grep -E "^(Parse|Fatal) error" && exit 1 || true

  # ==========================================
  # Job 3: Tests Service Auth
  # ==========================================
  tests-auth:
    name: Tests Service Auth
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-php]
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_sqlite, bcmath, gd, pcov
          coverage: pcov

      - name: Tests du Service Auth
        working-directory: ./services/auth
        run: |
          composer install --prefer-dist --no-progress
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate
          touch database/database.sqlite
          DB_CONNECTION=sqlite DB_DATABASE=database/database.sqlite php artisan test --coverage-clover coverage.xml

      - name: Sauvegarde couverture Auth
        uses: actions/upload-artifact@v4
        with:
          name: couverture-auth
          path: services/auth/coverage.xml
 
  # ==========================================
  # Job 4: Tests Service Catalog
  # ==========================================
  tests-catalog:
    name: Tests Service Catalog
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-php]
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_sqlite, bcmath, gd, pcov
          coverage: pcov

      - name: Tests du Service Catalog
        working-directory: ./services/catalog
        run: |
          composer install --prefer-dist --no-progress
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate
          touch database/database.sqlite
          DB_CONNECTION=sqlite DB_DATABASE=database/database.sqlite php artisan test --coverage-clover coverage.xml

      - name: Sauvegarde couverture Catalog
        uses: actions/upload-artifact@v4
        with:
          name: couverture-catalog
          path: services/catalog/coverage.xml

  # ==========================================
  # Job 5: Tests Service Inscription
  # ==========================================
  tests-inscription:
    name: Tests Service Inscription
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-php]
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_sqlite, bcmath, gd, pcov
          coverage: pcov

      - name: Tests du Service Inscription
        working-directory: ./services/inscription
        run: |
          composer install --prefer-dist --no-progress
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate
          touch database/database.sqlite
          DB_CONNECTION=sqlite DB_DATABASE=database/database.sqlite php artisan test --coverage-clover coverage.xml

      - name: Sauvegarde couverture Inscription
        uses: actions/upload-artifact@v4
        with:
          name: couverture-inscription
          path: services/inscription/coverage.xml

  # ==========================================
  # Job 6: Analyse SonarCloud
  # ==========================================
  sonarcloud:
    name: Analyse SonarCloud
    runs-on: ubuntu-latest
    needs: [tests-auth, tests-catalog, tests-inscription]
    if: github.event_name == 'push'
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Récupération couverture Auth
        uses: actions/download-artifact@v4
        with:
          name: couverture-auth
          path: services/auth

      - name: Récupération couverture Catalog
        uses: actions/download-artifact@v4
        with:
          name: couverture-catalog
          path: services/catalog

      - name: Récupération couverture Inscription
        uses: actions/download-artifact@v4
        with:
          name: couverture-inscription
          path: services/inscription

      - name: Analyse avec SonarCloud
        uses: SonarSource/sonarcloud-github-action@v3
        with:
          projectBaseDir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==========================================
  # Job 7: Build images Docker (CI)
  # ==========================================
  docker-build:
    name: Build des images Docker
    runs-on: ubuntu-latest
    needs: [tests-auth, tests-catalog, tests-inscription]
    if: github.event_name == 'push'
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: skillhub-frontend:${{ github.sha }}

      - name: Build image Service Auth
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth
          push: false
          tags: skillhub-auth:${{ github.sha }}

      - name: Build image Service Catalog
        uses: docker/build-push-action@v5
        with:
          context: ./services/catalog
          push: false
          tags: skillhub-catalog:${{ github.sha }}

      - name: Build image Service Inscription
        uses: docker/build-push-action@v5
        with:
          context: ./services/inscription
          push: false
          tags: skillhub-inscription:${{ github.sha }}

  # ==========================================
  # Job 8: CD — Push images vers GHCR (main seulement)
  # ==========================================
  docker-push:
    name: Push images vers GitHub Container Registry
    runs-on: ubuntu-latest
    needs: [docker-build, sonarcloud]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/skillhub-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/skillhub-frontend:latest

      - name: Push image Service Auth
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/skillhub-auth:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/skillhub-auth:latest

      - name: Push image Service Catalog
        uses: docker/build-push-action@v5
        with:
          context: ./services/catalog
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/skillhub-catalog:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/skillhub-catalog:latest

      - name: Push image Service Inscription
        uses: docker/build-push-action@v5
        with:
          context: ./services/inscription
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/skillhub-inscription:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/skillhub-inscription:latest
